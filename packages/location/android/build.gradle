group = "com.lyokone.location"
version = "1.0-SNAPSHOT"

buildscript {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.11.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.2.20")
        classpath("org.jlleitschuh.gradle:ktlint-gradle:12.1.2")
    }
}

repositories {
    google()
    mavenCentral()
}

apply plugin: "com.android.library"

def agpMajor = Integer.parseInt(com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.split("\\.")[0])
if (agpMajor < 9) {
    apply plugin: "org.jetbrains.kotlin.android"
}

apply plugin: "org.jlleitschuh.gradle.ktlint"

android {
    namespace = "com.lyokone.location"
    compileSdk = 36

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 21
        targetSdk = 36
    }
}

// Use the top-level `kotlin` DSL instead of `android.kotlinOptions` so that the
// compiler options resolve both with KGP (AGP < 9) and with AGP 9's built-in
// Kotlin, where the `kotlinOptions` block is no longer available.
kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_11
        // allWarningsAsErrors = true // TODO(bartekpacia): Re-enable
    }
}

dependencies {
    compileOnly("androidx.annotation:annotation:1.8.1")
    implementation("androidx.core:core-ktx:1.16.0")
    api("com.google.android.gms:play-services-location:21.3.0")
}
